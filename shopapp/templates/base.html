<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopApp</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, serif; background: #f4f1ec; color: #1a1a1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #fff; border: 1px solid #ddd; padding: 40px; width: 100%; max-width: 420px; }
    h1 { font-size: 1.6rem; margin-bottom: 24px; letter-spacing: -0.5px; }
    label { display: block; font-size: 0.85rem; margin-bottom: 4px; color: #555; }
    input[type=text], input[type=password] { width: 100%; padding: 10px; border: 1px solid #ccc; font-size: 1rem; margin-bottom: 16px; font-family: inherit; }
    input[type=text]:focus, input[type=password]:focus { outline: 2px solid #1a1a1a; }
    button, .btn { background: #1a1a1a; color: #fff; border: none; padding: 11px 20px; font-size: 1rem; cursor: pointer; width: 100%; font-family: inherit; }
    button:hover, .btn:hover { background: #333; }
    .link { margin-top: 16px; font-size: 0.85rem; color: #555; text-align: center; }
    .link a { color: #1a1a1a; }
    .error { color: #c0392b; font-size: 0.85rem; margin-bottom: 12px; }
  </style>
</head>
<body>
  {% block content %}{% endblock %}
</body>
</html>
